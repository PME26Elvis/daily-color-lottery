name: Weekly Release Bundle

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package weekly outputs
        id: package
        run: |
          set +e
          python -m src.package_release --days 7
          code=$?
          if [ "$code" = "78" ]; then
            echo "has_bundle=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$code" != "0" ]; then
            exit "$code"
          fi
          bundle=$(ls dist/*.zip | head -n 1)
          echo "has_bundle=true" >> "$GITHUB_OUTPUT"
          echo "bundle=$bundle" >> "$GITHUB_OUTPUT"
          echo "tag=weekly-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.package.outputs.has_bundle == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.package.outputs.tag }}" \
            "${{ steps.package.outputs.bundle }}" \
            --title "Daily Color Lottery Weekly Bundle ${{ steps.package.outputs.tag }}" \
            --notes "Automated weekly bundle containing recent generated outputs and logs."
