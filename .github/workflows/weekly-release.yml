name: Weekly Release Bundle

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Package weekly release assets
        id: package
        run: |
          set +e
          python -m src.package_release --days 7
          bundle_code=$?
          if [ "$bundle_code" != "0" ] && [ "$bundle_code" != "78" ]; then
            exit "$bundle_code"
          fi

          python -m src.package_weekly_showcase --days 7
          showcase_code=$?
          if [ "$showcase_code" != "0" ] && [ "$showcase_code" != "78" ]; then
            exit "$showcase_code"
          fi
          set -e

          mapfile -t assets < <(find dist -maxdepth 1 -type f -name '*.zip' | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "has_assets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'assets<<EOF\n' >> "$GITHUB_OUTPUT"
          printf '%s\n' "${assets[@]}" >> "$GITHUB_OUTPUT"
          printf 'EOF\n' >> "$GITHUB_OUTPUT"
          echo "has_assets=true" >> "$GITHUB_OUTPUT"
          echo "tag=weekly-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.package.outputs.has_assets == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package.outputs.tag }}
          RELEASE_ASSETS: ${{ steps.package.outputs.assets }}
        run: |
          mapfile -t assets <<< "$RELEASE_ASSETS"
          gh release create "$RELEASE_TAG" \
            "${assets[@]}" \
            --title "Daily Color Lottery Weekly Bundle $RELEASE_TAG" \
            --notes "Automated weekly release containing the raw weekly output bundle plus one per-source animated showcase asset with MP4, single-file base64 HTML, manifest, and build log."
