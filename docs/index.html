<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily Color Lottery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="eyebrow">GitHub Actions Image Experiment</p>
        <h1>Daily Color Lottery</h1>
        <p class="subtitle">A lab-style dashboard for daily randomized color grading runs.</p>
      </div>
      <div class="status-pill" id="run-status">Loading…</div>
    </header>

    <main>
      <section class="grid metrics" id="metrics"></section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Today</p>
            <h2>Generated Results</h2>
          </div>
          <p id="run-meta" class="muted"></p>
        </div>
        <div id="today-results" class="sources"></div>
      </section>

      <section class="two-column">
        <div class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">All-time</p>
              <h2>Leaderboard</h2>
            </div>
          </div>
          <div id="leaderboard" class="leaderboard"></div>
        </div>

        <div class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Repository</p>
              <h2>Source Changes</h2>
            </div>
          </div>
          <div id="source-events" class="events"></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">History</p>
            <h2>Run Log</h2>
          </div>
        </div>
        <div id="runs" class="runs"></div>
      </section>
    </main>

    <footer>
      Generated by <code>daily-color-lottery</code>. Scores are heuristic and non-AI.
    </footer>

    <script src="app.js"></script>
  </body>
</html>
